<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Faturamento UP IT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    .sidebar-toggle {
      position: absolute; top: var(--space-5); right: calc(-1 * var(--space-4));
      width: 24px; height: 24px; border-radius: var(--radius-full);
      background: var(--color-surface); border: var(--border-strong);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 101; transition: background 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .sidebar-toggle:hover { background: var(--color-accent-light); }
    .sidebar-toggle svg { transition: transform 0.25s; }
    .sidebar-brand { position: relative; }
    .sidebar { transition: width 0.25s ease; overflow: hidden; }
    .sidebar.collapsed { width: 56px; }
    .sidebar.collapsed .brand-name,
    .sidebar.collapsed .nav-section-label,
    .sidebar.collapsed .user-name,
    .sidebar.collapsed .user-role { display: none; }
    .sidebar.collapsed .nav-item { justify-content: center; padding: var(--space-2); font-size: 0; gap: 0; }
    .sidebar.collapsed .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .sidebar.collapsed .sidebar-brand { padding: 0 var(--space-3) var(--space-6); }
    .sidebar.collapsed .sidebar-footer { padding: var(--space-4) var(--space-3); }
    .sidebar.collapsed .user-info { justify-content: center; }
    .sidebar.collapsed .sidebar-toggle svg { transform: rotate(180deg); }
    .sidebar.collapsed ~ .main-content { width: calc(100% - 56px); }

    .sidebar-footer { position: relative; }
    .user-menu-trigger {
      cursor: pointer; border-radius: var(--radius-md); padding: var(--space-2);
      margin: calc(-1 * var(--space-2)); transition: background 0.15s;
      width: calc(100% + var(--space-4));
    }
    .user-menu-trigger:hover { background: var(--color-accent-light); }
    .user-menu {
      position: absolute; bottom: calc(100% + var(--space-2)); left: 0; right: 0;
      background: var(--color-surface); border: var(--border-strong);
      border-radius: var(--radius-md); box-shadow: var(--shadow-md);
      padding: var(--space-2); display: none; z-index: 200;
    }
    .user-menu.open { display: block; }
    .user-menu-item {
      display: flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm);
      font-size: var(--text-sm); color: var(--color-text); text-decoration: none;
      transition: background 0.15s; cursor: pointer; background: none;
      border: none; width: 100%; font-family: var(--font-body);
    }
    .user-menu-item:hover { background: var(--color-accent-light); }
    .user-menu-item-danger { color: var(--color-danger); }
    .user-menu-item-danger:hover { background: var(--color-danger-bg); }
    .sidebar.collapsed .user-menu { left: 0; right: auto; min-width: 160px; }

    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-4); margin-bottom: var(--space-8); }
    .kpi-card { background: var(--color-surface); border: var(--border); border-radius: var(--radius-lg); padding: var(--space-6); }
    .kpi-label { font-size: var(--text-sm); color: var(--color-text-secondary); margin-bottom: var(--space-2); }
    .kpi-value { font-size: var(--text-2xl); font-weight: 600; color: var(--color-text); }
    .kpi-value.success { color: var(--color-success); }
    .kpi-value.warning { color: var(--color-warning); }
    .kpi-value.danger  { color: var(--color-danger); }

    .month-table { width: 100%; border-collapse: collapse; }
    .month-table th { font-size: var(--text-sm); font-weight: 500; color: var(--color-text-secondary); text-align: left; padding: var(--space-3) var(--space-4); border-bottom: var(--border-strong); }
    .month-table td { padding: var(--space-3) var(--space-4); border-bottom: var(--border); font-size: var(--text-sm); }
    .month-table tbody tr:hover { background: var(--color-accent-light); }
    .month-table td.money { font-variant-numeric: tabular-nums; }
    .progress-bar { height: 6px; background: var(--color-border); border-radius: var(--radius-full); overflow: hidden; margin-top: var(--space-1); }
    .progress-fill { height: 100%; background: var(--color-success); border-radius: var(--radius-full); transition: width 0.3s; }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-name">Faturamento UP IT</span>
      <button class="sidebar-toggle" id="sidebarToggle" title="Recolher menu">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
          <path d="M7.5 2L3.5 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.4"/></svg>
        Dashboard
      </a>
      <a href="/notas" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="1" width="12" height="14" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 5h6M5 8h6M5 11h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Notas Fiscais
      </a>
      <a href="/extrato" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4h12M2 8h12M2 12h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Extrato OFX
      </a>
      <a href="/conciliacao" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Conciliação
      </a>
      <a href="/aliases" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.4"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        Aliases
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-menu" id="userMenu">
        <button class="user-menu-item user-menu-item-danger">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M11 11l3-3-3-3M14 8H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Sair
        </button>
      </div>
      <div class="user-info user-menu-trigger" id="userMenuTrigger">
        <div class="user-avatar">UP</div>
        <div>
          <div class="user-name">UP IT</div>
          <div class="user-role">Financeiro</div>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <h1 class="page-title">Dashboard</h1>
      <p class="page-subtitle">Visão geral do faturamento 2026</p>
    </header>

    <section class="page-body">
      <div class="kpi-grid" id="kpiGrid">
        <div class="kpi-card"><div class="kpi-label">Total Faturado</div><div class="kpi-value" id="kpiFaturado">—</div></div>
        <div class="kpi-card"><div class="kpi-label">Total Pago</div><div class="kpi-value success" id="kpiPago">—</div></div>
        <div class="kpi-card"><div class="kpi-label">Em Aberto</div><div class="kpi-value warning" id="kpiAberto">—</div></div>
        <div class="kpi-card"><div class="kpi-label">Sem Match</div><div class="kpi-value danger" id="kpiSemMatch">—</div></div>
      </div>

      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Resumo por Mês</h3>
        </div>
        <div class="card-body" style="padding: 0;">
          <table class="month-table">
            <thead>
              <tr>
                <th>Mês</th>
                <th class="text-right">Faturado</th>
                <th class="text-right">Pago</th>
                <th class="text-right">Aberto</th>
                <th class="text-right">Sem Match</th>
                <th style="width:160px">Recebimento</th>
              </tr>
            </thead>
            <tbody id="mesTabela">
              <tr><td colspan="6" style="text-align:center; color:var(--color-text-muted); padding: var(--space-8);">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <footer class="powered-bar">powered by <strong>up it</strong></footer>
  </main>
</div>

<script>
  const sidebar = document.querySelector('.sidebar');
  const toggle  = document.getElementById('sidebarToggle');
  toggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));

  const userTrigger = document.getElementById('userMenuTrigger');
  const userMenu    = document.getElementById('userMenu');
  userTrigger.addEventListener('click', (e) => { e.stopPropagation(); userMenu.classList.toggle('open'); });
  document.addEventListener('click', () => userMenu.classList.remove('open'));

  function fmt(v) {
    return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  async function loadDashboard() {
    const res = await fetch('/api/summary');
    const data = await res.json();
    document.getElementById('kpiFaturado').textContent = fmt(data.total_faturado);
    document.getElementById('kpiPago').textContent     = fmt(data.total_pago);
    document.getElementById('kpiAberto').textContent   = fmt(data.total_aberto);
    document.getElementById('kpiSemMatch').textContent = fmt(data.total_sem_match);

    const tbody = document.getElementById('mesTabela');
    if (!data.por_mes.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--color-text-muted); padding: var(--space-8);">Nenhuma nota fiscal cadastrada</td></tr>';
      return;
    }
    tbody.innerHTML = data.por_mes.map(m => {
      const pct = m.total > 0 ? Math.round((m.pago / m.total) * 100) : 0;
      return `<tr>
        <td><strong>${m.nome}</strong></td>
        <td class="money text-right">${fmt(m.total)}</td>
        <td class="money text-right" style="color:var(--color-success)">${fmt(m.pago)}</td>
        <td class="money text-right" style="color:var(--color-warning)">${fmt(m.aberto)}</td>
        <td class="money text-right" style="color:var(--color-danger)">${fmt(m.sem_match)}</td>
        <td>
          <div style="font-size:var(--text-xs); color:var(--color-text-secondary); margin-bottom:var(--space-1)">${pct}%</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </td>
      </tr>`;
    }).join('');
  }

  loadDashboard();
</script>
</body>
</html>
