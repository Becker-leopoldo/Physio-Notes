services:
  faturamento:
    build:
      context: ..                        # raiz do repositório (inclui assets/)
      dockerfile: "Faturamento Up/Dockerfile"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////app/data/faturamento.db
    volumes:
      - faturamento_data:/app/data
      - ./credenciais.json:/app/credenciais.json:ro   # somente leitura
    restart: unless-stopped

volumes:
  faturamento_data:
