services:
  faturamento:
    build:
      context: ..                        # raiz do repositório (inclui assets/)
      dockerfile: "Faturamento Up/Dockerfile"
    ports:
      - "8000:8000"
    env_file:
      - .env                                    # contém DATABASE_URL e GOOGLE_CREDENTIALS_JSON
    volumes:
      - faturamento_data:/app/data
      - ./frontend:/app/frontend      # HTML editável sem rebuild
      - ./assets:/app/assets          # CSS editável sem rebuild
    restart: unless-stopped

volumes:
  faturamento_data:
