<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Physio Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:        #F9F8F6;
      --color-surface:   #FFFFFF;
      --color-border:    #E8E6E1;
      --color-border-strong: #D0CEC9;
      --color-text:      #1A1A1A;
      --color-text-secondary: #6B6860;
      --color-text-muted: #A09D97;
      --color-accent:    #1A1A1A;
      --color-accent-light: #F0EFED;
      --color-success:   #2D6A4F;
      --color-success-bg: #EDF7F2;
      --color-danger:    #9B1C1C;
      --color-danger-bg: #FEF2F2;
      --color-info:      #1E3A5F;
      --color-info-bg:   #EFF6FF;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --text-sm: 0.875rem;
      --text-3xl: 1.875rem;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: var(--space-10);
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-8);
    }

    .login-brand { text-align: center; }
    .login-brand h1 {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }
    .login-brand p {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    .login-body {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .status-msg {
      font-size: var(--text-sm);
      text-align: center;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      display: none;
    }
    .status-msg.success { display: block; background: var(--color-success-bg); color: var(--color-success); }
    .status-msg.error   { display: block; background: var(--color-danger-bg);  color: var(--color-danger); }
    .status-msg.info    { display: block; background: var(--color-info-bg);    color: var(--color-info); }

    .powered-bar {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      text-align: center;
    }
    .powered-bar strong { color: var(--color-text-secondary); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <h1>Physio Notes</h1>
      <p>Prontuário clínico por voz</p>
    </div>

    <div class="login-body">
      <div class="status-msg" id="statusMsg"></div>
      <div id="google-btn-wrap" style="display:flex;justify-content:center;min-height:44px;"></div>
    </div>

    <span class="powered-bar">powered by <strong>up it</strong></span>
  </div>

  <script>
    function setStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = 'status-msg ' + type;
    }

    // Redireciona se já está logado
    if (localStorage.getItem('physio_token')) {
      window.location.replace('/');
    } else if (localStorage.getItem('sec_token')) {
      window.location.replace('/secretaria/');
    } else {
      iniciarGoogleSSO();
    }

    async function iniciarGoogleSSO() {
      try {
        const cfg = await fetch('/auth/config').then(r => r.json());
        if (!cfg.google_client_id) return;

        const script = document.createElement('script');
        script.src = 'https://accounts.google.com/gsi/client';
        script.onload = () => {
          const client = google.accounts.oauth2.initCodeClient({
            client_id: cfg.google_client_id,
            scope: 'openid email profile https://www.googleapis.com/auth/calendar',
            ux_mode: 'popup',
            callback: handleGoogleCode,
          });

          const btn = document.createElement('button');
          btn.style.cssText = `
            display:flex;align-items:center;justify-content:center;gap:10px;
            width:280px;height:44px;border-radius:4px;border:1px solid #dadce0;
            background:#fff;font-family:'DM Sans',sans-serif;font-size:14px;
            font-weight:500;color:#3c4043;cursor:pointer;
            box-shadow:0 1px 2px rgba(0,0,0,.08);transition:box-shadow .15s;
          `;
          btn.onmouseover = () => btn.style.boxShadow = '0 2px 6px rgba(0,0,0,.14)';
          btn.onmouseout  = () => btn.style.boxShadow = '0 1px 2px rgba(0,0,0,.08)';
          btn.innerHTML = `
            <svg width="18" height="18" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            Entrar com Google
          `;
          btn.addEventListener('click', () => {
            btn.disabled = true;
            btn.style.opacity = '0.7';
            client.requestCode();
          });
          document.getElementById('google-btn-wrap').appendChild(btn);
        };
        document.head.appendChild(script);
      } catch (e) { console.error('loadGoogleBtn', e); }
    }

    async function handleGoogleCode(response) {
      if (response.error) {
        const btn = document.querySelector('#google-btn-wrap button');
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
        return;
      }
      setStatus('Autenticando com Google...', 'info');
      try {
        const res = await fetch('/auth/google-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: response.code }),
        });
        const data = await res.json();

        if (res.status === 403) {
          setStatus('Cadastro realizado! Aguarde a aprovação do administrador para acessar.', 'info');
          return;
        }
        if (!res.ok) throw new Error(data.detail || 'Erro ao autenticar');

        const nome = data.nome.split(' ')[0];

        if (data.role === 'secretaria') {
          localStorage.setItem('sec_token', data.token);
          localStorage.setItem('sec_user', JSON.stringify({ nome: data.nome, email: data.email, foto: data.foto }));
          setStatus('Olá, ' + nome + '! Redirecionando...', 'success');
          setTimeout(() => { window.location.replace('/secretaria/'); }, 900);
        } else {
          localStorage.setItem('physio_token', data.token);
          localStorage.setItem('physio_user', JSON.stringify({ nome: data.nome, email: data.email, foto: data.foto }));
          setStatus('Olá, ' + nome + '! Redirecionando...', 'success');
          setTimeout(() => { window.location.replace('/'); }, 900);
        }
      } catch (e) {
        setStatus(e.message, 'error');
        const btn = document.querySelector('#google-btn-wrap button');
        if (btn) { btn.disabled = false; btn.style.opacity = '1'; }
      }
    }
  </script>
</body>
</html>
