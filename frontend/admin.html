<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Physio Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:        #F9F8F6;
      --color-surface:   #FFFFFF;
      --color-border:    #E8E6E1;
      --color-border-strong: #D0CEC9;
      --color-text:      #1A1A1A;
      --color-text-secondary: #6B6860;
      --color-text-muted: #A09D97;
      --color-accent:    #1A1A1A;
      --color-accent-hover: #333333;
      --color-accent-light: #F0EFED;
      --color-success:   #2D6A4F;
      --color-success-bg: #EDF7F2;
      --color-warning:   #92600A;
      --color-warning-bg: #FEF7EC;
      --color-danger:    #9B1C1C;
      --color-danger-bg: #FEF2F2;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --text-xs: 0.75rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-2xl: 1.5rem;
      --text-3xl: 1.875rem;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      padding: var(--space-8) var(--space-4);
    }

    .page-wrap {
      max-width: 640px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .page-header h1 {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
    }

    .page-header p {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-top: 0.25rem;
    }

    .btn-back {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      text-decoration: none;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      transition: background 0.15s;
      flex-shrink: 0;
    }
    .btn-back:hover { background: var(--color-accent-light); }

    .section-label {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
      margin-bottom: var(--space-3);
    }

    .user-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4) var(--space-6);
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    .user-card + .user-card { margin-top: var(--space-2); }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--color-accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: var(--text-sm);
      flex-shrink: 0;
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .user-info { flex: 1; min-width: 0; }
    .user-nome { font-weight: 600; font-size: var(--text-sm); }
    .user-email { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 2px; }

    .user-actions { display: flex; gap: var(--space-2); flex-shrink: 0; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 0.4rem var(--space-3);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-success { background: var(--color-success-bg); color: var(--color-success); }
    .btn-success:hover:not(:disabled) { background: #d5eddf; }
    .btn-danger { background: var(--color-danger-bg); color: var(--color-danger); }
    .btn-danger:hover:not(:disabled) { background: #fce4e4; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 500;
    }
    .badge-pending { background: var(--color-warning-bg); color: var(--color-warning); }
    .badge-active  { background: var(--color-success-bg); color: var(--color-success); }
    .badge-admin   { background: var(--color-accent); color: #fff; }

    .empty {
      text-align: center;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      padding: var(--space-8);
    }

    .btn-primary { background: var(--color-accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #333; }

    .powered-bar {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      text-align: center;
    }
    .powered-bar strong { color: var(--color-text-secondary); }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1>Physio Notes</h1>
        <p>Gerenciamento de usuários</p>
      </div>
      <a href="/" class="btn-back">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Voltar ao app
      </a>
    </div>

    <div>
      <div class="section-label">Convites de secretaria pendentes</div>
      <div id="lista-sec-pendentes"><div class="empty">Carregando...</div></div>
    </div>

    <div>
      <div class="section-label">Pendentes de aprovação</div>
      <div id="lista-pendentes"><div class="empty">Carregando...</div></div>
    </div>

    <div>
      <div class="section-label">Usuários ativos</div>
      <div id="lista-ativos"><div class="empty">Carregando...</div></div>
    </div>

    <span class="powered-bar">powered by <strong>up it</strong></span>
  </div>

  <script>
    const token = localStorage.getItem('physio_token');
    if (!token) { window.location.href = '/login.html'; }

    function initials(nome) {
      return (nome || '?').split(' ').map(p => p[0]).slice(0, 2).join('').toUpperCase();
    }

    function avatar(u) {
      if (u.foto_url) return `<img src="${u.foto_url}" alt="">`;
      return initials(u.nome);
    }

    async function carregar() {
      const res = await fetch('/admin/usuarios', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 403) {
        document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#9B1C1C;">Acesso restrito ao administrador.</div>';
        return;
      }
      const usuarios = await res.json();
      const adminEmail = usuarios.find(u => u.ativo)?.email; // heurística — admin é o primeiro ativo

      const pendentes = usuarios.filter(u => !u.ativo);
      const ativos    = usuarios.filter(u =>  u.ativo);

      renderLista('lista-pendentes', pendentes, true);
      renderLista('lista-ativos',    ativos,    false);
    }

    function renderLista(containerId, lista, isPending) {
      const el = document.getElementById(containerId);
      if (!lista.length) {
        el.innerHTML = `<div class="empty">${isPending ? 'Nenhum usuário aguardando aprovação.' : 'Nenhum usuário ativo.'}</div>`;
        return;
      }
      el.innerHTML = lista.map(u => `
        <div class="user-card" id="card-${btoa(u.email)}">
          <div class="user-avatar">${avatar(u)}</div>
          <div class="user-info">
            <div class="user-nome">${u.nome || '—'}</div>
            <div class="user-email">${u.email}</div>
          </div>
          <div class="user-actions">
            ${isPending
              ? `<button class="btn btn-success" onclick="aprovar('${u.email}', this)">Aprovar</button>`
              : `<button class="btn btn-danger"  onclick="revogar('${u.email}', this)">Revogar</button>`
            }
          </div>
        </div>
      `).join('');
    }

    async function aprovar(email, btn) {
      btn.disabled = true;
      btn.textContent = '...';
      await fetch(`/admin/usuarios/${encodeURIComponent(email)}/aprovar`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      carregar();
    }

    async function revogar(email, btn) {
      if (!confirm(`Revogar acesso de ${email}?`)) return;
      btn.disabled = true;
      btn.textContent = '...';
      await fetch(`/admin/usuarios/${encodeURIComponent(email)}/revogar`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      carregar();
    }

    async function carregarConvitesPendentes() {
      const el = document.getElementById('lista-sec-pendentes');
      try {
        const res = await fetch('/admin/secretaria/pendentes', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (res.status === 403) { el.innerHTML = ''; return; } // não é admin
        const lista = await res.json();
        if (!lista.length) {
          el.innerHTML = `<div class="empty">Nenhum convite pendente.</div>`;
          return;
        }
        el.innerHTML = lista.map(c => `
          <div class="user-card" id="sec-card-${btoa(c.secretaria_email)}">
            <div class="user-avatar">${initials(c.secretaria_email)}</div>
            <div class="user-info">
              <div class="user-nome">${c.secretaria_email}</div>
              <div class="user-email">Convidada por ${c.fisio_email}</div>
            </div>
            <div class="user-actions">
              <button class="btn btn-success" onclick="aprovarSecretaria('${c.secretaria_email}', this)">Aprovar</button>
              <button class="btn btn-danger"  onclick="rejeitarSecretaria('${c.secretaria_email}', this)">Rejeitar</button>
            </div>
          </div>
        `).join('');
      } catch(e) {
        el.innerHTML = `<div class="empty">Erro ao carregar.</div>`;
      }
    }

    async function aprovarSecretaria(email, btn) {
      btn.disabled = true; btn.textContent = '...';
      await fetch(`/admin/secretaria/${encodeURIComponent(email)}/aprovar`, {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      carregarConvitesPendentes();
    }

    async function rejeitarSecretaria(email, btn) {
      if (!confirm(`Rejeitar convite de ${email}?`)) return;
      btn.disabled = true; btn.textContent = '...';
      await fetch(`/admin/secretaria/${encodeURIComponent(email)}/rejeitar`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      carregarConvitesPendentes();
    }

    carregar();
    carregarConvitesPendentes();
  </script>
</body>
</html>
