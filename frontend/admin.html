<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Physio Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:            #F9F8F6;
      --color-surface:       #FFFFFF;
      --color-border:        #E8E6E1;
      --color-border-strong: #D0CEC9;
      --color-text:          #1A1A1A;
      --color-text-secondary:#6B6860;
      --color-text-muted:    #A09D97;
      --color-accent:        #1A1A1A;
      --color-accent-hover:  #333333;
      --color-accent-light:  #F0EFED;
      --color-success:       #2D6A4F;
      --color-success-bg:    #EDF7F2;
      --color-warning:       #92600A;
      --color-warning-bg:    #FEF7EC;
      --color-danger:        #9B1C1C;
      --color-danger-bg:     #FEF2F2;
      --color-info:          #1E3A5F;
      --color-info-bg:       #EFF6FF;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --radius-sm:  4px;
      --radius-md:  8px;
      --radius-lg:  12px;
      --radius-xl:  16px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.07);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
      --space-1:  0.25rem;
      --space-2:  0.5rem;
      --space-3:  0.75rem;
      --space-4:  1rem;
      --space-5:  1.25rem;
      --space-6:  1.5rem;
      --space-8:  2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --text-xs:   0.75rem;
      --text-sm:   0.875rem;
      --text-base: 1rem;
      --text-lg:   1.125rem;
      --text-xl:   1.25rem;
      --text-2xl:  1.5rem;
      --text-3xl:  1.875rem;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      padding: var(--space-8) var(--space-4);
    }

    .page-wrap {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      line-height: 1.15;
    }
    .page-header p {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-top: 0.25rem;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      text-decoration: none;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      transition: background 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .btn-back:hover { background: var(--color-accent-light); }

    /* ── KPI Strip ── */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-4);
    }
    .kpi-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-5) var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
    }
    .kpi-label {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
    }
    .kpi-value {
      font-size: var(--text-2xl);
      font-weight: 600;
      color: var(--color-text);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }
    .kpi-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      padding: 0 6px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 700;
      background: var(--color-danger);
      color: #fff;
      line-height: 1;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: var(--space-3);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-muted);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: var(--space-3) var(--space-4) var(--space-3) 2.25rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      background: var(--color-surface);
      color: var(--color-text);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--color-border-strong); }
    .search-input::placeholder { color: var(--color-text-muted); }

    /* ── Section ── */
    .section-block { display: flex; flex-direction: column; gap: var(--space-3); }
    .section-label {
      font-size: var(--text-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
    }

    /* ── Alert banner ── */
    .alert-banner {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      background: var(--color-warning-bg);
      border: 1px solid #f0d28a;
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      color: var(--color-warning);
    }

    /* ── User Card ── */
    .user-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .user-card-main {
      padding: var(--space-4) var(--space-5);
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--color-accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: var(--text-sm);
      flex-shrink: 0;
      overflow: hidden;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-avatar.danger { background: var(--color-danger); }
    .user-info { flex: 1; min-width: 0; }
    .user-nome {
      font-weight: 600;
      font-size: var(--text-sm);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-meta {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-actions { display: flex; gap: var(--space-2); flex-shrink: 0; }

    /* ── Secretaria sub-row ── */
    .sec-sub {
      border-top: 1px solid var(--color-border);
      padding: var(--space-3) var(--space-5) var(--space-3) calc(var(--space-5) + 40px + var(--space-4));
      display: flex;
      align-items: center;
      gap: var(--space-3);
      background: var(--color-bg);
    }
    .sec-sub-icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background: var(--color-accent-light);
      color: var(--color-text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.65rem;
      font-weight: 700;
    }
    .sec-sub-icon.warning { background: var(--color-warning-bg); color: var(--color-warning); }
    .sec-sub-info { flex: 1; min-width: 0; }
    .sec-sub-nome {
      font-size: var(--text-xs);
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sec-sub-email {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }
    .sec-sub-badge {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 2px 6px;
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }
    .sec-sub-badge.ativa   { background: var(--color-success-bg); color: var(--color-success); }
    .sec-sub-badge.pendente{ background: var(--color-warning-bg); color: var(--color-warning); }
    .sec-sub-badge.alerta  { background: var(--color-danger-bg);  color: var(--color-danger);  }

    /* ── Badges ── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 500;
      flex-shrink: 0;
    }
    .badge-pending { background: var(--color-warning-bg); color: var(--color-warning); }
    .badge-active  { background: var(--color-success-bg); color: var(--color-success); }
    .badge-danger  { background: var(--color-danger-bg);  color: var(--color-danger);  }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: 0.375rem var(--space-3);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-success { background: var(--color-success-bg); color: var(--color-success); }
    .btn-success:hover:not(:disabled) { background: #d5eddf; }
    .btn-danger  { background: var(--color-danger-bg);  color: var(--color-danger);  }
    .btn-danger:hover:not(:disabled)  { background: #fce4e4; }
    .btn-primary { background: var(--color-accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #333; }
    .btn-ghost {
      background: transparent;
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--color-accent-light); }

    /* ── Empty / Loading ── */
    .empty {
      text-align: center;
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      padding: var(--space-8);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
    }

    /* ── Footer ── */
    .powered-bar {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      text-align: center;
    }
    .powered-bar strong { color: var(--color-text-secondary); }

    /* ── Hidden utility ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="page-wrap">

    <!-- Header -->
    <div class="page-header">
      <div>
        <h1>Physio Notes</h1>
        <p>Gerenciamento de usuários</p>
      </div>
      <a href="/" class="btn-back">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Voltar ao app
      </a>
    </div>

    <!-- KPI Strip -->
    <div class="kpi-strip">
      <div class="kpi-card">
        <span class="kpi-label">Fisios Ativos</span>
        <span class="kpi-value" id="kpi-fisios">—</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Secretárias Ativas</span>
        <span class="kpi-value" id="kpi-secs">—</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">Pendentes</span>
        <span class="kpi-value" id="kpi-pendentes">—</span>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
      <input class="search-input" type="search" id="search-input" placeholder="Buscar por nome ou e-mail…">
    </div>

    <!-- Alerta de inconsistência -->
    <div id="alert-inconsistente" class="alert-banner hidden">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M8 2L14.5 13H1.5L8 2Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M8 7v3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="8" cy="11.5" r="0.75" fill="currentColor"/>
      </svg>
      <span id="alert-inconsistente-msg">Secretária ativa com fisio revogado detectada.</span>
    </div>

    <!-- Seção: Pendentes (visível só se houver) -->
    <div id="section-pendentes" class="section-block hidden">
      <div class="section-label">Aguardando aprovação</div>
      <div id="lista-pendentes"></div>
    </div>

    <!-- Seção: Fisios Ativos -->
    <div id="section-ativos" class="section-block">
      <div class="section-label">Fisios ativos</div>
      <div id="lista-ativos"><div class="empty">Carregando...</div></div>
    </div>

    <!-- Seção: Inativos -->
    <div id="section-inativos" class="section-block hidden">
      <div class="section-label">Inativos</div>
      <div id="lista-inativos"></div>
    </div>

    <footer class="powered-bar">powered by <strong>up it</strong></footer>
  </div>

  <script>
    const token = localStorage.getItem('physio_token');
    if (!token) { globalThis.location.href = '/login.html'; }

    /* ─── Utilitários ─── */
    function initials(str) {
      return (str || '?').split(/[\s@]/).filter(Boolean).map(p => p[0]).slice(0, 2).join('').toUpperCase();
    }

    function avatarHtml(u) {
      if (u && u.foto_url) return `<img src="${escHtml(u.foto_url)}" alt="">`;
      return escHtml(initials(u ? (u.nome || u.email) : '?'));
    }

    function escHtml(s) {
      return String(s ?? '').replaceAll(/&/g,'&amp;').replaceAll(/</g,'&lt;').replaceAll(/>/g,'&gt;').replaceAll(/"/g,'&quot;');
    }

    /* ─── Estado global ─── */
    let _usuarios = [];       // lista de fisios
    let _links    = [];       // todos os links de secretaria (não deletados)
    let _query    = '';

    /* ─── Fetch principal ─── */
    async function carregar() {
      try {
        const [resU, resL] = await Promise.all([
          fetch('/admin/usuarios',           { headers: { Authorization: 'Bearer ' + token } }),
          fetch('/admin/secretaria/todas',   { headers: { Authorization: 'Bearer ' + token } }),
        ]);

        if (resU.status === 403) {
          document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#9B1C1C;font-size:1rem;">Acesso restrito ao administrador.</div>';
          return;
        }

        _usuarios = await resU.json();
        _links    = resL.ok ? await resL.json() : [];

      } catch (e) {
        document.getElementById('lista-ativos').innerHTML = '<div class="empty">Erro ao carregar dados.</div>';
        return;
      }

      renderTudo();
    }

    /* ─── Render principal ─── */
    function renderTudo() {
      const q = _query.toLowerCase().trim();

      const fisioAtivos   = _usuarios.filter(u =>  u.ativo);
      const fisioInativos = _usuarios.filter(u => !u.ativo);

      // Mapa: fisio_email → link de secretaria
      const linkPorFisio = {};
      _links.forEach(l => { linkPorFisio[l.fisio_email] = l; });

      // Pendentes unificados (fisios inativos não aprovados + secretarias pendentes)
      const fisiosPendentes = fisioInativos; // fisios ainda não aprovados
      const secsPendentes   = _links.filter(l => l.status === 'pendente');

      // Detectar inconsistências: secretária ativa com fisio revogado
      const inconsistentes = _links.filter(l => {
        if (l.status !== 'ativa') return false;
        const fisio = _usuarios.find(u => u.email === l.fisio_email);
        return fisio && !fisio.ativo;
      });

      // KPIs
      const secsAtivas = _links.filter(l => l.status === 'ativa').length;
      const pendTotal  = fisiosPendentes.length + secsPendentes.length;

      updateKpi('kpi-fisios',    fisioAtivos.length);
      updateKpi('kpi-secs',      secsAtivas);
      updateKpiPendentes('kpi-pendentes', pendTotal);

      // Alerta
      const alertEl = document.getElementById('alert-inconsistente');
      if (inconsistentes.length > 0) {
        const msg = inconsistentes.map(l => `${l.secretaria_email} → fisio ${l.fisio_email} inativo`).join('; ');
        document.getElementById('alert-inconsistente-msg').textContent =
          `Atenção: secretária ativa com fisio revogado — ${msg}`;
        alertEl.classList.remove('hidden');
      } else {
        alertEl.classList.add('hidden');
      }

      // Filtro de busca
      function matchQ(u) {
        if (!q) return true;
        return (u.nome || '').toLowerCase().includes(q) || (u.email || '').toLowerCase().includes(q);
      }
      function matchQLinkSec(l) {
        if (!q) return true;
        return l.secretaria_email.toLowerCase().includes(q);
      }

      // ─── Pendentes ───
      const fisiosPendFiltrados = fisiosPendentes.filter(matchQ);
      const secsPendFiltradas   = secsPendentes.filter(matchQLinkSec);
      const hasPendentes        = fisiosPendFiltrados.length > 0 || secsPendFiltradas.length > 0;

      const secPend = document.getElementById('section-pendentes');
      secPend.classList.toggle('hidden', !hasPendentes);

      if (hasPendentes) {
        let html = '';
        fisiosPendFiltrados.forEach(u => {
          html += renderPendenteFisio(u);
        });
        secsPendFiltradas.forEach(l => {
          html += renderPendenteSecretaria(l);
        });
        document.getElementById('lista-pendentes').innerHTML = html;
      }

      // ─── Ativos ───
      const ativosVisiveis = fisioAtivos.filter(u => {
        if (matchQ(u)) return true;
        // Também mostrar se busca casa com secretaria vinculada
        const link = linkPorFisio[u.email];
        return link && matchQLinkSec(link);
      });

      const listaAtivos = document.getElementById('lista-ativos');
      if (!ativosVisiveis.length) {
        listaAtivos.innerHTML = '<div class="empty">Nenhum fisio ativo encontrado.</div>';
      } else {
        listaAtivos.innerHTML = ativosVisiveis.map(u => {
          const link = linkPorFisio[u.email];
          return renderFisioAtivo(u, link, inconsistentes);
        }).join('');
      }

      // ─── Inativos ───
      const inativosFiltrados = fisioInativos.filter(matchQ);
      const secInat = document.getElementById('section-inativos');
      secInat.classList.toggle('hidden', inativosFiltrados.length === 0);
      document.getElementById('lista-inativos').innerHTML =
        inativosFiltrados.map(u => renderFisioInativo(u)).join('');
    }

    function updateKpi(id, val) {
      document.getElementById(id).textContent = val;
    }

    function updateKpiPendentes(id, val) {
      const el = document.getElementById(id);
      if (val > 0) {
        el.innerHTML = `${val} <span class="kpi-badge">${val}</span>`;
      } else {
        el.textContent = val;
      }
    }

    /* ─── Templates ─── */
    function renderPendenteFisio(u) {
      const id = btoa(u.email).replaceAll(/[^a-zA-Z0-9]/g, '');
      return `
        <div class="user-card" id="card-${id}" data-email="${escHtml(u.email)}" data-nome="${escHtml(u.nome)}">
          <div class="user-card-main">
            <div class="user-avatar">${avatarHtml(u)}</div>
            <div class="user-info">
              <div class="user-nome">${escHtml(u.nome || '—')}</div>
              <div class="user-meta">${escHtml(u.email)} &nbsp;·&nbsp; <span class="badge badge-pending">Fisio pendente</span></div>
            </div>
            <div class="user-actions">
              <button class="btn btn-success" onclick="aprovar('${escHtml(u.email)}', this)">Aprovar</button>
              <button class="btn btn-danger"  onclick="rejeitarFisio('${escHtml(u.email)}', this)">Negar</button>
            </div>
          </div>
        </div>`;
    }

    function renderPendenteSecretaria(l) {
      const id = btoa(l.secretaria_email).replaceAll(/[^a-zA-Z0-9]/g, '');
      return `
        <div class="user-card" id="sec-pend-${id}" data-email="${escHtml(l.secretaria_email)}">
          <div class="user-card-main">
            <div class="user-avatar">${escHtml(initials(l.secretaria_email))}</div>
            <div class="user-info">
              <div class="user-nome">${escHtml(l.secretaria_email)}</div>
              <div class="user-meta">Convidada por ${escHtml(l.fisio_email)} &nbsp;·&nbsp; <span class="badge badge-pending">Secretária pendente</span></div>
            </div>
            <div class="user-actions">
              <button class="btn btn-success" onclick="aprovarSecretaria('${escHtml(l.secretaria_email)}', this)">Aprovar</button>
              <button class="btn btn-danger"  onclick="rejeitarSecretaria('${escHtml(l.secretaria_email)}', this)">Rejeitar</button>
            </div>
          </div>
        </div>`;
    }

    function renderFisioAtivo(u, link, inconsistentes) {
      const id = btoa(u.email).replaceAll(/[^a-zA-Z0-9]/g, '');
      let subHtml = '';
      if (link) {
        const isInconsistente = inconsistentes.some(l => l.secretaria_email === link.secretaria_email);
        const statusClass = link.status === 'ativa' ? 'ativa' : 'pendente';
        const badgeClass = isInconsistente ? 'alerta' : statusClass;
        const badgeLabel = isInconsistente ? 'Fisio revogado' : link.status;
        const iconClass  = isInconsistente ? 'warning' : '';
        subHtml = `
          <div class="sec-sub">
            <div class="sec-sub-icon ${iconClass}">${escHtml(initials(link.secretaria_email))}</div>
            <div class="sec-sub-info">
              <div class="sec-sub-nome">${escHtml(link.secretaria_email)}</div>
              <div class="sec-sub-email">Secretária vinculada</div>
            </div>
            <span class="sec-sub-badge ${badgeClass}">${escHtml(badgeLabel)}</span>
          </div>`;
      }
      return `
        <div class="user-card" id="card-${id}" data-email="${escHtml(u.email)}" data-nome="${escHtml(u.nome)}">
          <div class="user-card-main">
            <div class="user-avatar">${avatarHtml(u)}</div>
            <div class="user-info">
              <div class="user-nome">${escHtml(u.nome || '—')}</div>
              <div class="user-meta">${escHtml(u.email)}${link ? '' : ' &nbsp;·&nbsp; sem secretária'}</div>
            </div>
            <div class="user-actions">
              <button class="btn btn-danger" onclick="revogar('${escHtml(u.email)}', this)">Revogar</button>
            </div>
          </div>
          ${subHtml}
        </div>`;
    }

    function renderFisioInativo(u) {
      const id = btoa(u.email).replaceAll(/[^a-zA-Z0-9]/g, '');
      return `
        <div class="user-card" id="card-${id}" data-email="${escHtml(u.email)}" data-nome="${escHtml(u.nome)}">
          <div class="user-card-main">
            <div class="user-avatar danger">${avatarHtml(u)}</div>
            <div class="user-info">
              <div class="user-nome">${escHtml(u.nome || '—')}</div>
              <div class="user-meta">${escHtml(u.email)} &nbsp;·&nbsp; <span class="badge badge-danger">Inativo</span></div>
            </div>
            <div class="user-actions">
              <button class="btn btn-success" onclick="aprovar('${escHtml(u.email)}', this)">Reativar</button>
            </div>
          </div>
        </div>`;
    }

    /* ─── Ações ─── */
    async function aprovar(email, btn) {
      btn.disabled = true;
      btn.textContent = '…';
      await fetch(`/admin/usuarios/${encodeURIComponent(email)}/aprovar`, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token }
      });
      await carregar();
    }

    async function revogar(email, btn) {
      if (!confirm(`Revogar acesso de ${email}?`)) return;
      btn.disabled = true;
      btn.textContent = '…';
      await fetch(`/admin/usuarios/${encodeURIComponent(email)}/revogar`, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token }
      });
      await carregar();
    }

    function _modalConfirmar({ titulo, descricao, frase, labelBtn, onConfirm }) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9000;display:flex;align-items:center;justify-content:center;padding:24px;';
      overlay.innerHTML = `
        <div style="background:#fff;border-radius:16px;padding:32px;max-width:360px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.12);">
          <div style="font-size:28px;text-align:center;margin-bottom:16px;">⚠️</div>
          <h3 style="font-size:18px;font-weight:600;margin:0 0 8px;text-align:center;">${titulo}</h3>
          <p style="font-size:14px;color:#6B6860;text-align:center;margin:0 0 20px;">${descricao}</p>
          <p style="text-align:center;margin:0 0 16px;"><strong style="font-family:monospace;font-size:12px;background:#F0EFED;padding:2px 6px;border-radius:4px;letter-spacing:.03em;">${frase}</strong></p>
          <input type="text" class="_mc-input" placeholder="Digite a frase acima" style="width:100%;box-sizing:border-box;padding:8px 12px;border:1px solid #E8E6E1;border-radius:8px;font-size:14px;margin-bottom:16px;text-align:center;outline:none;">
          <div style="display:flex;flex-direction:column;gap:8px;">
            <button class="_mc-ok" style="width:100%;padding:10px;background:#9B1C1C;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;opacity:.4;pointer-events:none;" disabled>${labelBtn}</button>
            <button class="_mc-cancel" style="width:100%;padding:10px;background:none;border:none;font-size:14px;cursor:pointer;color:#6B6860;">Cancelar</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      const input = overlay.querySelector('._mc-input');
      const okBtn = overlay.querySelector('._mc-ok');
      setTimeout(() => input.focus(), 100);
      input.addEventListener('input', () => {
        const ok = input.value.trim() === frase;
        okBtn.disabled = !ok;
        okBtn.style.opacity = ok ? '1' : '.4';
        okBtn.style.pointerEvents = ok ? '' : 'none';
      });
      overlay.querySelector('._mc-cancel').addEventListener('click', () => overlay.remove());
      okBtn.addEventListener('click', () => { overlay.remove(); onConfirm(); });
    }

    async function rejeitarFisio(email, btn) {
      _modalConfirmar({
        titulo: 'Negar acesso',
        descricao: `Negar solicitação de <strong>${escHtml(email)}</strong>.<br>O usuário poderá solicitar novamente no futuro.`,
        frase: 'EU QUERO NEGAR',
        labelBtn: 'Negar acesso',
        onConfirm: async () => {
          btn.disabled = true; btn.textContent = '…';
          await fetch(`/admin/usuarios/${encodeURIComponent(email)}/rejeitar`, {
            method: 'DELETE', headers: { Authorization: 'Bearer ' + token }
          });
          await carregar();
        }
      });
    }

    async function aprovarSecretaria(email, btn) {
      btn.disabled = true;
      btn.textContent = '…';
      await fetch(`/admin/secretaria/${encodeURIComponent(email)}/aprovar`, {
        method: 'POST',
        headers: { Authorization: 'Bearer ' + token }
      });
      await carregar();
    }

    async function rejeitarSecretaria(email, btn) {
      _modalConfirmar({
        titulo: 'Rejeitar secretária',
        descricao: `Rejeitar convite de <strong>${escHtml(email)}</strong>.<br>O vínculo será encerrado.`,
        frase: 'EU QUERO REJEITAR',
        labelBtn: 'Rejeitar secretária',
        onConfirm: async () => {
          btn.disabled = true; btn.textContent = '…';
          await fetch(`/admin/secretaria/${encodeURIComponent(email)}/rejeitar`, {
            method: 'DELETE', headers: { Authorization: 'Bearer ' + token }
          });
          await carregar();
        }
      });
    }

    /* ─── Busca ─── */
    document.getElementById('search-input').addEventListener('input', e => {
      _query = e.target.value;
      renderTudo();
    });

    /* ─── Init ─── */
    carregar();
  </script>
</body>
</html>
