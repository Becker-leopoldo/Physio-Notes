<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Physio Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:        #F9F8F6;
      --color-surface:   #FFFFFF;
      --color-border:    #E8E6E1;
      --color-border-strong: #D0CEC9;
      --color-text:      #1A1A1A;
      --color-text-secondary: #6B6860;
      --color-text-muted: #A09D97;
      --color-accent:    #1A1A1A;
      --color-accent-hover: #333333;
      --color-accent-light: #F0EFED;
      --color-success:   #2D6A4F;
      --color-success-bg: #EDF7F2;
      --color-danger:    #9B1C1C;
      --color-danger-bg: #FEF2F2;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-md: 0 2px 8px rgba(0,0,0,0.07);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.125rem;
      --text-3xl: 1.875rem;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: var(--space-10) var(--space-10);
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-8);
    }

    .login-brand {
      text-align: center;
    }

    .login-brand h1 {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }

    .login-brand p {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    .login-body {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .status-msg {
      font-size: var(--text-sm);
      text-align: center;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      display: none;
    }
    .status-msg.success {
      display: block;
      background: var(--color-success-bg);
      color: var(--color-success);
    }
    .status-msg.error {
      display: block;
      background: var(--color-danger-bg);
      color: var(--color-danger);
    }
    .status-msg.info {
      display: block;
      background: var(--color-accent-light);
      color: var(--color-text-secondary);
    }

    .powered-bar {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      text-align: center;
    }
    .powered-bar strong { color: var(--color-text-secondary); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <h1>Physio Notes</h1>
      <p>Prontuário clínico por voz</p>
    </div>

    <div class="login-body">
      <div class="status-msg" id="statusMsg"></div>

      <!-- Google SSO -->
      <div id="google-btn-wrap" style="display:flex;justify-content:center;min-height:44px;"></div>
    </div>

    <span class="powered-bar">powered by <strong>up it</strong></span>
  </div>

  <script>
    function setStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = 'status-msg ' + type;
    }

    // Redireciona se já está logado
    if (localStorage.getItem('physio_token')) {
      window.location.href = '/';
    } else {
      iniciarGoogleSSO();
    }

    // ── Google SSO ──────────────────────────────────────────────
    async function iniciarGoogleSSO() {
      try {
        const cfg = await fetch('/auth/config').then(r => r.json());
        if (!cfg.google_client_id) return; // não configurado — esconde silenciosamente
        const script = document.createElement('script');
        script.src = 'https://accounts.google.com/gsi/client';
        script.onload = () => {
          google.accounts.id.initialize({
            client_id: cfg.google_client_id,
            callback: handleGoogleCredential,
            auto_select: false,
          });
          google.accounts.id.renderButton(
            document.getElementById('google-btn-wrap'),
            { theme: 'outline', size: 'large', text: 'signin_with', shape: 'rectangular', width: 280, locale: 'pt-BR' }
          );
        };
        document.head.appendChild(script);
      } catch (_) {}
    }

    async function handleGoogleCredential(response) {
      setStatus('Autenticando com Google...', 'info');
      try {
        const res = await fetch('/auth/google-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential }),
        });
        const data = await res.json();
        if (res.status === 403) {
          setStatus('Cadastro realizado! Aguarde a aprovação do administrador para acessar.', 'info');
          return;
        }
        if (!res.ok) throw new Error(data.detail || 'Erro ao autenticar');
        localStorage.setItem('physio_token', data.token);
        localStorage.setItem('physio_user', JSON.stringify({ nome: data.nome, email: data.email, foto: data.foto }));
        setStatus('Olá, ' + data.nome.split(' ')[0] + '! Redirecionando...', 'success');
        setTimeout(() => { window.location.href = '/'; }, 900);
      } catch (e) {
        setStatus(e.message, 'error');
      }
    }
  </script>
</body>
</html>
