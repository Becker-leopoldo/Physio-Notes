<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Physio Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:        #F9F8F6;
      --color-surface:   #FFFFFF;
      --color-border:    #E8E6E1;
      --color-border-strong: #D0CEC9;
      --color-text:      #1A1A1A;
      --color-text-secondary: #6B6860;
      --color-text-muted: #A09D97;
      --color-accent:    #1A1A1A;
      --color-accent-hover: #333333;
      --color-accent-light: #F0EFED;
      --color-success:   #2D6A4F;
      --color-success-bg: #EDF7F2;
      --color-danger:    #9B1C1C;
      --color-danger-bg: #FEF2F2;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-md: 0 2px 8px rgba(0,0,0,0.07);
      --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --space-8: 2rem;
      --space-10: 2.5rem;
      --space-12: 3rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.125rem;
      --text-3xl: 1.875rem;
    }

    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: var(--space-10) var(--space-10);
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-8);
    }

    .login-brand {
      text-align: center;
    }

    .login-brand h1 {
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }

    .login-brand p {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    .biometric-icon {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-full);
      background: var(--color-accent-light);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .biometric-icon svg {
      width: 36px;
      height: 36px;
      color: var(--color-text);
    }

    .login-body {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      width: 100%;
      padding: 0.75rem var(--space-6);
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: var(--text-base);
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      border: none;
    }

    .btn-primary {
      background: var(--color-accent);
      color: #fff;
    }
    .btn-primary:hover:not(:disabled) { background: var(--color-accent-hover); }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-secondary {
      background: transparent;
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border-strong);
      font-size: var(--text-sm);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--color-accent-light); }
    .btn-secondary:disabled { opacity: 0.45; cursor: not-allowed; }

    .status-msg {
      font-size: var(--text-sm);
      text-align: center;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      display: none;
    }
    .status-msg.success {
      display: block;
      background: var(--color-success-bg);
      color: var(--color-success);
    }
    .status-msg.error {
      display: block;
      background: var(--color-danger-bg);
      color: var(--color-danger);
    }
    .status-msg.info {
      display: block;
      background: var(--color-accent-light);
      color: var(--color-text-secondary);
    }

    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: var(--space-3);
      color: var(--color-text-muted);
      font-size: var(--text-sm);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    .powered-bar {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      text-align: center;
    }
    .powered-bar strong { color: var(--color-text-secondary); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <h1>Physio Notes</h1>
      <p>Acesse com a biometria do seu dispositivo</p>
    </div>

    <div class="biometric-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04.054-.09A13.916 13.916 0 0 0 8 11a4 4 0 1 1 8 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0 0 15.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 0 0 8 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/>
      </svg>
    </div>

    <div class="login-body">
      <div class="status-msg" id="statusMsg"></div>

      <button class="btn btn-primary" id="btnLogin" onclick="fazerLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/>
        </svg>
        Entrar com biometria
      </button>

      <div class="divider" id="dividerRegistro">primeira vez neste dispositivo?</div>

      <button class="btn btn-secondary" id="btnRegistro" onclick="registrarDispositivo()">
        Registrar este dispositivo
      </button>
    </div>

    <span class="powered-bar">powered by <strong>up it</strong></span>
  </div>

  <script>
    const API = '';

    function b64urlToBuffer(b64url) {
      const b64 = b64url.replace(/-/g, '+').replace(/_/g, '/');
      const bin = atob(b64);
      return Uint8Array.from(bin, c => c.charCodeAt(0)).buffer;
    }

    function bufferToB64url(buffer) {
      const bytes = new Uint8Array(buffer);
      let bin = '';
      bytes.forEach(b => bin += String.fromCharCode(b));
      return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
    }

    function setStatus(msg, type) {
      const el = document.getElementById('statusMsg');
      el.textContent = msg;
      el.className = 'status-msg ' + type;
    }

    function setLoading(on) {
      document.getElementById('btnLogin').disabled = on;
      document.getElementById('btnRegistro').disabled = on;
    }

    async function verificarRegistro() {
      try {
        const res = await fetch(`${API}/auth/status`);
        const data = await res.json();
        if (data.registered) {
          document.getElementById('dividerRegistro').style.display = 'none';
          document.getElementById('btnRegistro').style.display = 'none';
        }
      } catch (_) {}
    }

    async function fazerLogin() {
      setLoading(true);
      setStatus('Aguardando biometria...', 'info');
      try {
        const beginRes = await fetch(`${API}/auth/login/begin`, { method: 'POST' });
        if (!beginRes.ok) {
          const err = await beginRes.json();
          setStatus(err.detail || 'Erro ao iniciar login.', 'error');
          setLoading(false);
          return;
        }
        const options = await beginRes.json();
        options.challenge = b64urlToBuffer(options.challenge);
        if (options.allowCredentials) {
          options.allowCredentials = options.allowCredentials.map(c => ({
            ...c,
            id: b64urlToBuffer(c.id),
          }));
        }

        const assertion = await navigator.credentials.get({ publicKey: options });

        const body = {
          id: assertion.id,
          rawId: bufferToB64url(assertion.rawId),
          response: {
            clientDataJSON: bufferToB64url(assertion.response.clientDataJSON),
            authenticatorData: bufferToB64url(assertion.response.authenticatorData),
            signature: bufferToB64url(assertion.response.signature),
          },
          type: assertion.type,
        };

        const completeRes = await fetch(`${API}/auth/login/complete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!completeRes.ok) {
          const err = await completeRes.json();
          setStatus(err.detail || 'Autenticação falhou.', 'error');
          setLoading(false);
          return;
        }

        const { token } = await completeRes.json();
        localStorage.setItem('physio_token', token);
        setStatus('Autenticado! Redirecionando...', 'success');
        setTimeout(() => { window.location.href = '/'; }, 800);

      } catch (e) {
        if (e.name === 'NotAllowedError') {
          setStatus('Autenticação cancelada.', 'error');
        } else {
          setStatus('Erro: ' + e.message, 'error');
        }
        setLoading(false);
      }
    }

    async function registrarDispositivo() {
      setLoading(true);
      setStatus('Aguardando biometria para registro...', 'info');
      try {
        const beginRes = await fetch(`${API}/auth/register/begin`, { method: 'POST' });
        if (!beginRes.ok) {
          const err = await beginRes.json();
          setStatus(err.detail || 'Erro ao iniciar registro.', 'error');
          setLoading(false);
          return;
        }
        const options = await beginRes.json();
        options.challenge = b64urlToBuffer(options.challenge);
        options.user.id = b64urlToBuffer(options.user.id);
        if (options.excludeCredentials) {
          options.excludeCredentials = options.excludeCredentials.map(c => ({
            ...c,
            id: b64urlToBuffer(c.id),
          }));
        }

        const credential = await navigator.credentials.create({ publicKey: options });

        const body = {
          id: credential.id,
          rawId: bufferToB64url(credential.rawId),
          response: {
            clientDataJSON: bufferToB64url(credential.response.clientDataJSON),
            attestationObject: bufferToB64url(credential.response.attestationObject),
          },
          type: credential.type,
        };

        const completeRes = await fetch(`${API}/auth/register/complete`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!completeRes.ok) {
          const err = await completeRes.json();
          setStatus(err.detail || 'Falha no registro.', 'error');
          setLoading(false);
          return;
        }

        const { token } = await completeRes.json();
        localStorage.setItem('physio_token', token);
        setStatus('Dispositivo registrado! Redirecionando...', 'success');
        setTimeout(() => { window.location.href = '/'; }, 800);

      } catch (e) {
        if (e.name === 'NotAllowedError') {
          setStatus('Registro cancelado.', 'error');
        } else {
          setStatus('Erro: ' + e.message, 'error');
        }
        setLoading(false);
      }
    }

    // Redireciona se já está logado
    if (localStorage.getItem('physio_token')) {
      window.location.href = '/';
    } else {
      verificarRegistro();
    }
  </script>
</body>
</html>
