<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo arredondado escuro -->
  <rect width="512" height="512" rx="112" fill="#1A1A1A"/>

  <!-- Caduceu com raio central — símbolo de fisioterapia/saúde -->
  <g fill="#F9F8F6" transform="translate(256,256)">

    <!-- Raio central (bastão) -->
    <polygon points="18,-210 -8,-60 14,-60 -18,210 8,60 -14,60" />

    <!-- Cobra superior esquerda - curva superior -->
    <path d="M -10,-170 C -80,-140 -90,-80 -40,-50 C -10,-32 10,-32 40,-50 C 90,-80 80,-140 10,-170
             C 30,-175 50,-160 55,-140 C 60,-110 40,-85 10,-70
             C -5,-62 -5,-62 -20,-70 C -50,-85 -70,-110 -65,-140
             C -60,-165 -35,-178 -10,-170 Z"
          opacity="0.95"/>

    <!-- Cobra inferior direita - curva intermediária -->
    <path d="M 10,-90 C 80,-60 90,0 40,30 C 10,48 -10,48 -40,30 C -90,0 -80,-60 -10,-90
             C -30,-95 -50,-80 -55,-60 C -60,-30 -40,-5 -10,10
             C 5,18 5,18 20,10 C 50,-5 70,-30 65,-60
             C 60,-85 35,-98 10,-90 Z"
          opacity="0.95"/>

    <!-- Cobra inferior - curva baixa -->
    <path d="M -10,-10 C -80,20 -90,80 -40,110 C -10,128 10,128 40,110 C 90,80 80,20 10,-10
             C 30,-15 50,0 55,20 C 60,50 40,75 10,90
             C -5,98 -5,98 -20,90 C -50,75 -70,50 -65,20
             C -60,-5 -35,-18 -10,-10 Z"
          opacity="0.95"/>

    <!-- Cabeça cobra esquerda -->
    <ellipse cx="-52" cy="-148" rx="14" ry="10" transform="rotate(-30,-52,-148)"/>
    <ellipse cx="-58" cy="-162" rx="6" ry="4" transform="rotate(-20,-58,-162)" opacity="0.7"/>

    <!-- Cabeça cobra direita -->
    <ellipse cx="52" cy="-148" rx="14" ry="10" transform="rotate(30,52,-148)"/>
    <ellipse cx="58" cy="-162" rx="6" ry="4" transform="rotate(20,58,-162)" opacity="0.7"/>

    <!-- Base do bastão -->
    <ellipse cx="0" cy="210" rx="14" ry="8"/>
    <ellipse cx="0" cy="198" rx="10" ry="6" opacity="0.6"/>

  </g>
</svg>
