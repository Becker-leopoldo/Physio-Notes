<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secretaria — Physio Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-bg: #F9F8F6; --color-surface: #FFFFFF; --color-border: #E8E6E1;
      --color-text: #1A1A1A; --color-text-secondary: #6B6860; --color-text-muted: #A09D97;
      --color-accent: #1A1A1A; --color-danger: #9B1C1C; --color-danger-bg: #FEF2F2;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --radius-lg: 12px; --radius-xl: 16px; --shadow-md: 0 2px 8px rgba(0,0,0,0.07);
    }
    body {
      font-family: var(--font-body); background: var(--color-bg);
      min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--color-surface); border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md); padding: 48px 32px; max-width: 400px; width: 100%;
      text-align: center;
    }
    .logo { font-family: var(--font-display); font-size: 28px; color: var(--color-text); margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: var(--color-text-muted); margin-bottom: 36px; }
    .badge {
      display: inline-block; background: #F0EFED; color: var(--color-text-secondary);
      font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 999px; margin-bottom: 24px;
    }
    #status-msg {
      font-size: 14px; padding: 12px 16px; border-radius: var(--radius-lg);
      margin-bottom: 20px; display: none;
    }
    #status-msg.info    { background: #EFF6FF; color: #1E3A5F; }
    #status-msg.error   { background: var(--color-danger-bg); color: var(--color-danger); }
    #status-msg.success { background: #EDF7F2; color: #2D6A4F; }
    #google-btn-wrap { margin-top: 8px; }
    .powered { font-size: 12px; color: var(--color-text-muted); margin-top: 32px; }
    .powered strong { color: var(--color-text-secondary); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Physio Notes</div>
    <div class="subtitle">Prontuário clínico por voz</div>
    <div class="badge">Módulo Secretaria</div>

    <div id="status-msg"></div>
    <div id="google-btn-wrap"></div>

    <div class="powered">powered by <strong>up it</strong></div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async></script>
  <script>
    const API_BASE = '';

    function setStatus(msg, type) {
      const el = document.getElementById('status-msg');
      el.textContent = msg; el.className = type; el.style.display = 'block';
    }

    async function handleGoogleCode(response) {
      if (response.error) return;
      setStatus('Autenticando...', 'info');
      try {
        const res = await fetch(`${API_BASE}/auth/google-login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: response.code }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Erro ao autenticar');
        if (data.role !== 'secretaria') {
          throw new Error('Este e-mail não está vinculado como secretaria. Contate o fisioterapeuta.');
        }
        localStorage.setItem('sec_token', data.token);
        localStorage.setItem('sec_user', JSON.stringify({ nome: data.nome, email: data.email, foto: data.foto }));
        setStatus('Acesso liberado! Redirecionando...', 'success');
        setTimeout(() => { window.location.href = '/secretaria/'; }, 800);
      } catch (e) {
        setStatus(e.message, 'error');
      }
    }

    window.addEventListener('load', () => {
      // Se já tem token válido, redireciona direto
      if (localStorage.getItem('sec_token')) {
        window.location.href = '/secretaria/';
        return;
      }
      fetch(`${API_BASE}/auth/config`).then(r => r.json()).then(cfg => {
        google.accounts.oauth2.initCodeClient({
          client_id: cfg.google_client_id,
          scope: 'openid email profile https://www.googleapis.com/auth/calendar',
          ux_mode: 'popup',
          callback: handleGoogleCode,
        }).requestCode();

        const wrap = document.getElementById('google-btn-wrap');
        google.accounts.id.initialize({ client_id: cfg.google_client_id, callback: () => {} });
        google.accounts.id.renderButton(wrap, {
          type: 'standard', shape: 'rectangular', theme: 'outline',
          text: 'signin_with', size: 'large', width: 336,
        });
      }).catch(() => setStatus('Erro ao carregar configuração', 'error'));
    });
  </script>
</body>
</html>
