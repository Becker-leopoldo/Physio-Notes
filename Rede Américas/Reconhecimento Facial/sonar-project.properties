# =============================================================
#  SonarCloud — POC Rede Américas · Reconhecimento Facial
# =============================================================
#
#  PASSOS PARA ATIVAR:
#  1. Acesse https://sonarcloud.io e faça login com GitHub
#  2. Clique em "+" > "Analyze new project" > selecione este repo
#  3. Copie o Organization Key e substitua <YOUR_ORG> abaixo
#  4. O projectKey segue o padrão <org>_<repo-name>
#  5. No GitHub repo: Settings > Secrets > Actions
#     Adicione: SONAR_TOKEN  (gerado no SonarCloud em Account > Security)
# =============================================================

sonar.organization=<YOUR_ORG>
sonar.projectKey=<YOUR_ORG>_poc-rede-americas-reconhecimento-facial
sonar.projectName=POC Rede Américas — Reconhecimento Facial

# Diretórios de código-fonte (relativos a este arquivo)
sonar.sources=backend,frontend

# Exclusões: arquivos que não devem ser analisados
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/node_modules/**,\
  **/dist/**,\
  **/.env,\
  **/.env.*,\
  **/docker/**

# Python
sonar.python.version=3.12

# Encoding
sonar.sourceEncoding=UTF-8
